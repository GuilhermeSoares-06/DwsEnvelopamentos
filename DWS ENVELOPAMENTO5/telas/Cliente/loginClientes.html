<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - DWS Envelopamento</title>
<link rel="stylesheet" href="../../css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;min-height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#1a1a1a 0%,#2d2d2d 100%);margin:0;padding:20px;font-family:'Inter',Arial,Helvetica,sans-serif}
.login-box{width:420px;max-width:100%;background:linear-gradient(145deg,#2a2a2a,#1a1a1a);border-radius:30px;padding:40px 35px;text-align:center;border:1px solid rgba(242,53,53,.2);box-shadow:0 20px 60px rgba(0,0,0,.6);position:relative;overflow:hidden;margin:0 auto}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#F23535,#ff6b6b,#F23535);background-size:200% 100%;animation:shimmer 3s ease-in-out infinite}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.btn-voltar{background:transparent;border:none;color:#A4A5A6;font-size:15px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:.3s;padding:0;margin-bottom:20px;justify-content:flex-start}
.btn-voltar:hover{color:#F23535}
.login-header{margin-bottom:30px}
.login-logo{width:100px;height:auto;margin:0 auto 15px;display:block}
.login-header h2{color:#FFF;font-size:1.8rem;font-weight:700;margin-bottom:5px}
.login-header p{color:#A4A5A6;font-size:.95rem}
.input-box{position:relative;margin-bottom:18px;width:100%}
.input-box .input-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:#888;font-size:16px;z-index:1}
.input-box input{width:100%;padding:14px 15px 14px 45px;border:2px solid #3a3a3a;outline:none;font-size:16px;border-radius:12px;background:#1a1a1a;color:#fff;transition:.3s;box-sizing:border-box}
.input-box input::placeholder{color:#666}
.input-box input:focus{border-color:#F23535;background:#222;box-shadow:0 0 0 4px rgba(242,53,53,.1)}
.btn-login{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#F23535,#c91f2c);color:#fff;font-size:18px;font-weight:700;cursor:pointer;transition:.3s;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:5px}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(242,53,53,.4)}
.btn-login:disabled{opacity:.7;cursor:not-allowed;transform:none}
.login-footer{margin-top:20px}
.cadastro-link{color:#A4A5A6;text-decoration:none;font-size:.95rem;transition:.3s}
.cadastro-link span{color:#F23535;font-weight:600}
.cadastro-link:hover{color:#FFF}
.cadastro-link:hover span{color:#ff5555;text-decoration:underline}
@media(max-width:480px){html,body{padding:10px}.login-box{padding:25px 20px;border-radius:20px}.login-header h2{font-size:1.4rem}.login-logo{width:70px}.input-box input{padding:12px 12px 12px 40px;font-size:14px}.btn-login{font-size:16px;padding:12px}}
</style>
</head>
<body>
<div class="login-box">
    <button class="btn-voltar" onclick="history.back()">
        <i class="fas fa-arrow-left"></i> Voltar
    </button>
    <div class="login-header">
        <img src="../../img/logoLOJA.png" alt="DWS Envelopamento" class="login-logo"
             onerror="this.style.display='none'">
        <h2>Bem-vindo de volta!</h2>
        <p>Faça login para continuar</p>
    </div>

    <!-- action e method mantidos para fallback sem JS, mas o submit é interceptado -->
    <form action="../../PHP/Usuarios/LoginClientes.php" method="POST">
        <div class="input-box">
            <i class="fas fa-user input-icon"></i>
            <input type="text" name="nome" placeholder="Nome de usuário" required autocomplete="username">
        </div>
        <div class="input-box">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" name="senha" placeholder="SENHA" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login">
            <i class="fas fa-sign-in-alt"></i> ENTRAR
        </button>
    </form>

    <div class="login-footer">
        <a href="CadastroCliente.html" class="cadastro-link">
            Não tem conta? <span>Cadastre-se</span>
        </a>
    </div>
</div>

<script src="../../js/auth.js"></script>
<script src="../../js/login.js"></script>
</body>
</html>
