<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel ADM - DWS Envelopamento</title>
<link rel="stylesheet" href="../../css/style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<header>
    <div class="logo">
        <img src="../../img/logoLOJA.png" alt="DWS" onerror="this.style.display='none'">
    </div>
    <nav>
        <a href="principalFUN.html">PRINCIPAL</a>
        <a href="../../PHP/Servico/GerenciarServico.php">LISTA DE SERVIÇOS</a>
        <a href="../../PHP/Clientes/ListarCliente.php">LISTA DE CLIENTES</a>
    </nav>
    <div class="icone-user">
        <img src="../../img/icon.user2.png" id="userIcon" alt="User" onerror="this.style.display='none'">
        <div class="menu-user" id="menuUser">
            <!-- populado pelo auth.js -->
        </div>
    </div>
</header>

<section class="fundo-principal">
    <section class="inicio-servico">
        <p class="mini-text">Bem-vindo ao painel!</p>
        <h1 id="saudacao">Seja bem-vindo.</h1>
        <p class="descricao">
            Gerencie clientes, serviços e agendamentos da DWS Envelopamento
            através dos menus acima.
        </p>
    </section>
</section>

<footer class="footer">
    <h2 class="textobranco">
        © KRONYX 2026 . Todos os direitos reservados.
        Política de Privacidade • Termos de Uso • Contato
    </h2>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../js/auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    // Protege a página — somente funcionários
    if (!DWSAuth.exigirAdmin('login.html')) return;

    const user = DWSAuth.getUser();
    if (user) {
        document.getElementById('saudacao').textContent =
            `Olá, ${user.nome.split(' ')[0]}! Seja bem-vindo.`;
    }
});
</script>
</body>
</html>
