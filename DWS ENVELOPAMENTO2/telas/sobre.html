<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
/*pegando o icone do usuario*/
const iconeUser = document.getElementById("userIcon");
/*pegando o menu dropdown*/
const menuUser = document.getElementById("menuUser");
/*evento de clique no icone*/
iconeUser.addEventListener("click", () => {
/*se estiver aberto, fecha*/
    if(menuUser.style.display === "flex"){
        menuUser.style.display = "none";
    }
/*se estiver fechado, abre*/
    else{
        menuUser.style.display = "flex";
    }

});

</script>
