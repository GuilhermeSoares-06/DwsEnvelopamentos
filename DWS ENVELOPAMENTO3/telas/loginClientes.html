<!DOCTYPE html>
<html lang="pt-br">
<head>

<!--configuração de acentos e caracteres especiais-->
<meta charset="UTF-8">

<!--responsividade para celular-->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!--titulo da pagina-->
<title>Login</title>

<!--conexao com o css principal-->
<link rel="stylesheet" href="../css/style.css">

<style>

/*corpo da pagina*/
body{
    background-color: #3B3B3B;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/*caixa principal do login*/
.login-box{
    width: 400px;
    max-width: 400px;
    background-color: #808080;
    border-radius: 40px;
    padding: 40px;
    text-align: center;
}

/*icone de usuario*/
.login-box img{
    width: 100px;
    margin-bottom: 20px;
}

/*espacamento dos inputs*/
.input-box{
    display: flex;
    margin-bottom: 20px;
}

/*estilo dos campos*/
.input-box input{
    width: 100%;
    padding: 15px;
    border: none;
    outline: none;
    font-size: 18px;
}

/*botao entrar*/
/*botao entrar*/
.btn-login{
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background-color: #F23535;
    color: black;
    font-size: 22px;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 15px;
}


.btn-voltar{
    background-color: transparent;
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
}

.btn-voltar:hover{
    color: #F23535;
}

</style>

</head>

<body>

<!--caixa principal-->
<div class="login-box">
 
    <button class="btn-voltar" onclick="history.back()">
        ← Voltar
    </button>

    <img src="../img/icon.user2.png" alt="Usuário">

    <!--FORMULÁRIO DE LOGIN - ADICIONADO-->
    <form action="../PHP/Usuarios/LoginClientes.php" method="POST">
        
        <!--campo usuario-->
        <div class="input-box">
            <input type="text" name="nome" placeholder="Nome" required>
        </div>

        <!--campo senha-->
        <div class="input-box">
            <input type="password" name="senha" placeholder="SENHA" required>
        </div>

        <!--botao entrar-->
        <button type="submit" class="btn-login">ENTRAR</button>
        
    </form>

    <!--link para cadastro-->
    <a href="cadastroCliente.html" class="cadastro-link">Não tem conta? Cadastre-se</a>

</div>

</body>
</html>
