<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>Contato - DWS Envelopamento</title>

<link rel="stylesheet" href="../css/style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* SÓ ESTILO DO FORMULARIO (não mexe no site inteiro) */

.contato-container {
    max-width: 900px;
    margin: 60px auto;
    background: #403E3F;
    padding: 40px;
    border-radius: 25px;
    border: 1px solid #F23535;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

.contato-container h1 {
    text-align: center;
    color: #F2F2F2;
    margin-bottom: 30px;
}

/* INPUTS */
.contato-container input,
.contato-container textarea {
    width: 100%;
    padding: 15px;
    margin-bottom: 15px;
    border: none;
    outline: none;
    border-radius: 10px;
    font-size: 16px;
    background: #2b2b2b;
    color: white;
}

/* BOTAO IGUAL SEU SITE */
.contato-container button {
    width: 100%;
    padding: 15px;
    background: #F23535;
    border: none;
    font-size: 20px;
    color: white;
    cursor: pointer;
    border-radius: 10px;
    transition: 0.3s;
}

.contato-container button:hover {
    background: #c91f2c;
}

/* INFO */
.contato-info {
    text-align: center;
    color: #A4A5A6;
    margin-top: 20px;
    font-size: 18px;
}

</style>

</head>

`Olá! Gostaria de entrar em contato:

<script>

/* MENU LOGIN/CADASTRO */
const iconeUser = document.getElementById("userIcon");
const menuUser = document.getElementById("menuUser");

iconeUser.addEventListener("click", () => {

    if(menuUser.style.display === "flex"){
        menuUser.style.display = "none";
    }

    else{
        menuUser.style.display = "flex";
    }

});

</script>
