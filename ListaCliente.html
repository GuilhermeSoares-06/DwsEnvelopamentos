<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Clientes</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#1e1e1e,#3b3b3b);
    min-height:100vh;
    padding:40px;
}

.container{
    max-width:1400px;
    margin:auto;
    background:#403E3F;
    padding:30px;
    border-radius:25px;
    border:1px solid #F23535;
}

h1{
    color:#fff;
    text-align:center;
    margin-bottom:10px;
}

.subtitulo{
    text-align:center;
    color:#aaa;
    margin-bottom:25px;
}

.total{
    background:#2b2b2b;
    color:#fff;
    padding:15px;
    border-radius:10px;
    text-align:right;
    margin-bottom:20px;
}

.total span{
    color:#F23535;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
    color:white;
}

th{
    background:#F23535;
    padding:15px;
    text-align:left;
}

td{
    padding:12px;
    border-bottom:1px solid #555;
}

tr:hover{
    background:#4a4a4a;
}

.btn{
    background:#F23535;
    color:white;
    text-decoration:none;
    padding:8px 15px;
    border-radius:8px;
}

.footer{
    display:flex;
    justify-content:space-between;
    margin-top:25px;
}

.voltar{
    background:#F23535;
    color:white;
    text-decoration:none;
    padding:12px 25px;
    border-radius:25px;
}

.novo{
    background:#4CAF50;
    color:white;
    text-decoration:none;
    padding:12px 25px;
    border-radius:25px;
}
</style>
</head>

<body>

<div class="container">

    <h1>Lista de Clientes</h1>
    <p class="subtitulo">Gerencie todos os clientes cadastrados</p>

    <div class="total">
        Total de clientes: <span>3</span>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>CPF</th>
                <th>Telefone</th>
                <th>Endereço</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>1</td>
                <td>João Silva</td>
                <td>123.456.789-00</td>
                <td>(11)99999-9999</td>
                <td>Rua A, 123</td>
                <td><a href="#" class="btn">Excluir</a></td>
            </tr>

            <tr>
                <td>2</td>
                <td>Maria Souza</td>
                <td>987.654.321-00</td>
                <td>(11)98888-8888</td>
                <td>Rua B, 456</td>
                <td><a href="#" class="btn">Excluir</a></td>
            </tr>
        </tbody>
    </table>

    <div class="footer">
        <a href="#" class="voltar">Voltar ao Menu</a>
        <a href="#" class="novo">Novo Cliente</a>
    </div>

</div>

</body>
</html>
