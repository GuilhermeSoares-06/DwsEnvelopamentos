<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro - DWS Envelopamento</title>
<link rel="stylesheet" href="../../css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
    /* RESET COMPLETO PARA ESTA PÁGINA */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        width: 100%;
        height: 100%;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
        margin: 0;
        padding: 20px;
        font-family: 'Inter', Arial, Helvetica, sans-serif;
    }

    /* CAIXA PRINCIPAL - CENTRALIZADA */
    .cadastro-box {
        width: 420px;
        max-width: 100%;
        background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
        border-radius: 30px;
        padding: 40px 35px;
        text-align: center;
        border: 1px solid rgba(242, 53, 53, 0.2);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        position: relative;
        overflow: hidden;
        margin: 0 auto;
    }

    /* LINHA SUPERIOR */
    .cadastro-box::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, #F23535, #ff6b6b, #F23535);
        background-size: 200% 100%;
        animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
    }

    /* BOTÃO VOLTAR */
    .btn-voltar {
        background: transparent;
        border: none;
        color: #A4A5A6;
        font-size: 15px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: 0.3s;
        padding: 0;
        margin-bottom: 20px;
        justify-content: flex-start;
    }

    .btn-voltar:hover {
        color: #F23535;
    }

    .btn-voltar i {
        font-size: 14px;
    }

    /* HEADER */
    .cadastro-header {
        margin-bottom: 30px;
    }

    .cadastro-logo {
        width: 100px;
        height: auto;
        margin-bottom: 15px;
        display: block;
        margin-left: auto;
        margin-right: auto;
    }

    .cadastro-header h2 {
        color: #FFFFFF;
        font-size: 1.8rem;
        font-weight: 700;
        margin-bottom: 5px;
    }

    .cadastro-header p {
        color: #A4A5A6;
        font-size: 0.95rem;
    }

    /* INPUTS */
    .input-box {
        position: relative;
        margin-bottom: 18px;
        width: 100%;
    }

    .input-box .input-icon {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #888;
        font-size: 16px;
        transition: 0.3s;
        z-index: 1;
    }

    .input-box input {
        width: 100%;
        padding: 14px 15px 14px 45px;
        border: 2px solid #3a3a3a;
        outline: none;
        font-size: 16px;
        border-radius: 12px;
        background: #1a1a1a;
        color: white;
        transition: 0.3s;
        box-sizing: border-box;
    }

    .input-box input::placeholder {
        color: #666;
    }

    .input-box input:focus {
        border-color: #F23535;
        background: #222;
        box-shadow: 0 0 0 4px rgba(242, 53, 53, 0.1);
    }

    /* BOTÃO CADASTRAR */
    .btn-cadastro {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, #F23535, #c91f2c);
        color: white;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-top: 5px;
    }

    .btn-cadastro:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(242, 53, 53, 0.4);
    }

    /* FOOTER */
    .cadastro-footer {
        margin-top: 20px;
    }

    .login-link {
        color: #A4A5A6;
        text-decoration: none;
        font-size: 0.95rem;
        transition: 0.3s;
    }

    .login-link span {
        color: #F23535;
        font-weight: 600;
        transition: 0.3s;
    }

    .login-link:hover {
        color: #FFFFFF;
    }

    .login-link:hover span {
        color: #ff5555;
        text-decoration: underline;
    }

    /* RESPONSIVO */
    @media (max-width: 480px) {
        html, body {
            padding: 10px;
        }

        .cadastro-box {
            padding: 25px 20px;
            border-radius: 20px;
        }

        .cadastro-header h2 {
            font-size: 1.4rem;
        }

        .cadastro-logo {
            width: 70px;
        }

        .input-box input {
            padding: 12px 12px 12px 40px;
            font-size: 14px;
        }

        .input-box .input-icon {
            font-size: 14px;
            left: 12px;
        }

        .btn-cadastro {
            font-size: 16px;
            padding: 12px;
        }

        .login-link {
            font-size: 0.85rem;
        }
    }
</style>
</head>

<body>

<div class="cadastro-box">
    <button class="btn-voltar" onclick="history.back()">
        <i class="fas fa-arrow-left"></i> Voltar
    </button>

    <div class="cadastro-header">
        <img src="../../img/logoLOJA.png" alt="DWS Envelopamento" class="cadastro-logo">
        <h2>Crie sua conta</h2>
        <p>Preencha os dados para se cadastrar</p>
    </div>

    <form action="../../PHP/Clientes/CadastroCliente.php" method="POST">
        <div class="input-box">
            <i class="fas fa-user input-icon"></i>
            <input type="text" name="nome" placeholder="NOME COMPLETO" required>
        </div>

        <div class="input-box">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" name="Senha" placeholder="SENHA" required>
        </div>

        <div class="input-box">
            <i class="fas fa-id-card input-icon"></i>
            <input type="text" name="cpf" placeholder="CPF (000.000.000-00)" required>
        </div>

        <div class="input-box">
            <i class="fas fa-home input-icon"></i>
            <input type="text" name="endereco" placeholder="ENDEREÇO" required>
        </div>

        <div class="input-box">
            <i class="fas fa-phone input-icon"></i>
            <input type="text" name="telefone" placeholder="TELEFONE (14) 99999-9999" required>
        </div>

        <button type="submit" class="btn-cadastro">
            <i class="fas fa-user-plus"></i> CADASTRAR
        </button>
    </form>

    <div class="cadastro-footer">
        <a href="loginClientes.html" class="login-link">
            Já tem conta? <span>Faça login</span>
        </a>
    </div>
</div>

</body>
</html>
