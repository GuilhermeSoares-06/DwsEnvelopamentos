<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Serviços</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#1e1e1e,#3b3b3b);
    min-height:100vh;
    padding:40px;
}

.container{
    max-width:1300px;
    margin:auto;
    background:#403E3F;
    padding:30px;
    border-radius:25px;
    border:1px solid #F23535;
}

h1{
    color:white;
    text-align:center;
    margin-bottom:30px;
}

table{
    width:100%;
    border-collapse:collapse;
    color:white;
}

th{
    background:#F23535;
    padding:15px;
    text-align:left;
}

td{
    padding:12px;
    border-bottom:1px solid #555;
}

tr:hover{
    background:#4a4a4a;
}

.valor{
    color:#ff9800;
    font-weight:bold;
}

.btn{
    color:white;
    text-decoration:none;
    padding:8px 15px;
    border-radius:8px;
}

.editar{
    background:#4CAF50;
}

.excluir{
    background:#F23535;
}

.voltar{
    display:inline-block;
    margin-top:25px;
    background:#F23535;
    color:white;
    text-decoration:none;
    padding:12px 25px;
    border-radius:25px;
}
</style>
</head>

<body>

<div class="container">

    <h1>📋 Lista de Pedidos</h1>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Cliente</th>
                <th>Telefone</th>
                <th>Serviço</th>
                <th>Descrição</th>
                <th>Valor</th>
                <th>Data</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>1</td>
                <td>João Silva</td>
                <td>(11)99999-9999</td>
                <td>Envelopamento</td>
                <td>Capô e teto</td>
                <td class="valor">R$ 1.500,00</td>
                <td>12/06/2026</td>
                <td>
                    <a href="#" class="btn editar">Editar</a>
                    <a href="#" class="btn excluir">Excluir</a>
                </td>
            </tr>

            <tr>
                <td>2</td>
                <td>Maria Souza</td>
                <td>(11)98888-8888</td>
                <td>Insulfilm</td>
                <td>Vidros laterais</td>
                <td class="valor">R$ 700,00</td>
                <td>10/06/2026</td>
                <td>
                    <a href="#" class="btn editar">Editar</a>
                    <a href="#" class="btn excluir">Excluir</a>
                </td>
            </tr>
        </tbody>
    </table>

    <a href="#" class="voltar">🏠 Voltar ao Menu</a>

</div>

</body>
</html>
